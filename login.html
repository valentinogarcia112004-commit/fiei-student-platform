<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - FIEI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>FIEI StudyHUB</h1>
                <p>Iniciar Sesión</p>
            </div>
            
            <form id="loginForm" class="auth-form" action="backend/login.php" method="POST">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="usuario@universidad.edu">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
                </div>
                
                <button type="submit" class="btn-primary btn-full">Iniciar Sesión</button>
                
                <div class="auth-links">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                    <p>¿No tienes cuenta? <a href="register.html">Registrarse</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
