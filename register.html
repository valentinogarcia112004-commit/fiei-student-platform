<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - FIEI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>FIEI</h1>
                <p>Crear Cuenta</p>
            </div>
            
            <form id="registerForm" class="auth-form" action="backend/register.php" method="POST">
                <div class="form-group">
                    <label for="fullName">Nombre Completo</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Ingresa tu nombre completo">
                </div>
                
                <div class="form-group">
                    <label for="email">Correo Electrónico Institucional</label>
                    <input type="email" id="email" name="email" required placeholder="usuario@universidad.edu">
                </div>
                
                <div class="form-group">
                    <label for="career">Carrera</label>
                    <select id="career" name="career" required>
                        <option value="">Selecciona tu carrera</option>
                        <option value="informatica">Ingeniería Informática</option>
                        <option value="electronica">Ingeniería Electrónica</option>
                        <option value="mecatronica">Ingeniería Mecatrónica</option>
                        <option value="telecomunicaciones">Ing. de Telecomunicaciones</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repite tu contraseña">
                </div>
                
                <button type="submit" class="btn-primary btn-full">Registrarse</button>
                
                <div class="auth-links">
                    <p>¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
